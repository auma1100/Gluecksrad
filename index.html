<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glücksrad mit knalliger Markierung</title>
<style>
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: sans-serif;
  background: #FFD700; /* knalliges Gelb */
  min-height: 100vh;
  padding: 20px;
  margin: 0;
}
textarea {
  width: 250px;
  height: 150px;
  margin-bottom: 10px;
  font-size: 14px;
}
.canvas-container {
  position: relative;
}
canvas {
  border: 5px solid #333;
  border-radius: 50%;
  margin: 20px 0;
  background: #FFD700;
}
.pointer {
  width: 0;
  height: 0;

  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-top: 40px solid red;

  position: absolute;
  top: -5px; /* 🔥 ggf. anpassen */
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;

  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4));
}

.button-row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
button {
  padding: 10px 20px;
  font-size: 14px;
  cursor: pointer;
}

#wheelWrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  flex: 1; /* 🔥 sorgt für echte Mitte */
}

/* --- LOGO oben links --- */
#logo {
  position: fixed;
  top: 10px;
  left: 10px;
  width: 350px;
  height: auto;
  z-index: 1000;
  opacity: 0.9;
  transition: all 0.3s;
}
#logo:hover {
  transform: scale(1.05);
  opacity: 1;
}

/* --- FOOTER --- */
#footer {
  position: fixed;
  bottom: 10px;
  left: 0;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0.7;
  pointer-events: none;
}



#rightSide {
  position: fixed;
  right: 340px;
  top: 52%;
  transform: translateY(-50%);

  display: flex;
  flex-direction: column;
  align-items: center;
  width: 300px;

  background: rgba(255,255,255,0.3);
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

#title {
  position: absolute;
  top: 120px;      /* 🔥 hier steuerst du die Höhe */
  left: 50%;
  transform: translateX(-50%);
  
  font-size: 48px;
  font-weight: bold;
}



@media (max-width: 768px) {

  body {
    padding: 10px;
    justify-content: flex-start; /* 🔥 verhindert Zentrier-Problem */
  }

  /* Logo kleiner */
  #logo {
    width: 110px;
    top: 5px;
    left: 5px;
  }

  /* Titel unter Logo */
  #title {
    position: static;
    transform: none;
    font-size: 22px;
    margin-top: 75px;
    margin-bottom: 10px;
    text-align: center;
  }

  /* Rad kompakter */
  #wheelWrapper {
    margin-top: 25px;
  flex: none; /* 🔥 NEU – verhindert Streckung */

  }

  canvas {
    width: 75vw;
    height: 75vw;
    max-width: 280px;
    max-height: 280px;
  }

  .pointer {
    top: -12px;
  }

  /* 🔥 GANZ WICHTIG: weniger Höhe + kompakt */
  #rightSide {
    position: static;
    transform: none;
    width: 100%;
    margin-top: 8px;
    padding: 8px;
  }

  textarea {
    width: 100%;
    height: 90px; /* 🔥 deutlich kleiner → Button sichtbar */
    font-size: 14px;
  }

  button {
    width: 100%;
    font-size: 16px;
    padding: 14px;
    margin-top: 5px;
  }

  /* Footer kleiner */
  #footer {
    font-size: 10px;
    bottom: 5px;
  }
}







</style>
</head>
<body>
<img src="logo.png" id="logo">

<h1 id="title">Glücksrad MA</h1>

<!-- 🎯 RAD (JETZT FIX ZENTRIERT) -->
<div id="wheelWrapper">
  <div class="canvas-container">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" width="400" height="400"></canvas>
  </div>
</div>

<!-- 👉 RECHTS: STEUERUNG -->
<div id="rightSide">
  <label>Liste der Namen (ein Name pro Zeile):</label><br>
  <textarea id="nameList">Preis 1
Preis 2
Preis 3
Preis 4
Preis 5
Preis 6</textarea>

 <div class="button-row">
  <button onclick="spinWheel()">Drehen</button>
</div>
</div>


<script>
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');

let rotation = 0;
let spinning = false;
let spinSpeed = 0.005;
let targetSpeed = 0;
let names = [];
let colors = [];

const colorsDefault = [
  '#FFEB3B', // gelb
  '#2196f3', // blau
  '#f44336', // rot
  '#4caf50', // grün
  '#ff9800', // orange
  '#9c27b0', // lila
  '#00e676', // hellgrün
  '#3f51b5', // indigo
  '#009688', // türkis
  '#e91e63', // pink
  '#607d8b'  // grau-blau
];

function getWinningIndex() {
  const numFields = names.length;
  const anglePerSegment = (2 * Math.PI) / numFields;

  let adjustedRotation = rotation % (2 * Math.PI);

  let pointerAngle = (3 * Math.PI / 2 - adjustedRotation);
  pointerAngle = (pointerAngle + 2 * Math.PI) % (2 * Math.PI);

return Math.floor(pointerAngle / anglePerSegment + 0.00001);}



function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}


function initWheel() {
  colors = [...colorsDefault]; // 🔥 feste Reihenfolge
  drawWheel();
}


function drawWheel() {
  const rawNames = document.getElementById('nameList').value.split('\n').map(n => n.trim()).filter(n => n);
  names = rawNames;
  const numFields = names.length;


  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const radius = canvas.width / 2;
const anglePerSegment = (2 * Math.PI) / numFields;

  for (let i = 0; i < numFields; i++) {
    const startAngle = i * anglePerSegment;
    const endAngle = startAngle + anglePerSegment;

    // Segment
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.arc(centerX, centerY, radius, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text mittig
    ctx.save();
    ctx.translate(centerX, centerY);
    const angleMiddle = startAngle + anglePerSegment / 2;
    ctx.rotate(angleMiddle);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';

    const words = names[i].split(' ');
    const maxLength = 12;
    let lines = [];
    let currentLine = '';
    for (let w of words) {
      if ((currentLine + ' ' + w).trim().length > maxLength) {
        lines.push(currentLine);
        currentLine = w;
      } else {
        currentLine += (currentLine ? ' ' : '') + w;
      }
    }
    if(currentLine) lines.push(currentLine);

    const lineHeight = 16;
    const textRadius = radius - 40;
    const startY = -((lines.length-1) * lineHeight)/2;

    lines.forEach((line, idx) => {
      ctx.save();
      ctx.translate(textRadius, startY + idx * lineHeight);
      ctx.rotate(Math.PI/2);
      ctx.fillText(line, 0, 0);
      ctx.restore();
    });

    ctx.restore();
  }

  // Weißer Kreis in der Mitte
  ctx.beginPath();
  ctx.arc(centerX, centerY, 30, 0, 2*Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function animate() {
  rotation += spinSpeed;
  ctx.save();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.translate(canvas.width/2, canvas.height/2);
  ctx.rotate(rotation);
  ctx.translate(-canvas.width/2, -canvas.height/2);
  drawWheel();
  ctx.restore();

  if(spinning) {
    spinSpeed += (targetSpeed - spinSpeed) * 0.02;
    if(Math.abs(spinSpeed) < 0.002 && targetSpeed === 0) {
      spinning = false;
      spinSpeed = 0.005;
      rotation = rotation % (2*Math.PI);

      // Gewinner: Segment unter der Markierung (oben bei 12 Uhr)
      const numFields = names.length;
const winningIndex = getWinningIndex();      alert(`Gewonnen: ${names[winningIndex]}`);
    }
  }

  requestAnimationFrame(animate);
}

function spinWheel() {
  if (spinning || names.length === 0) return;
  spinning = true;
  targetSpeed = Math.random() * 0.3 + 0.3;
  setTimeout(() => { targetSpeed = 0; }, 1500);
}

// Initial
initWheel();animate();
</script>
<div id="footer">
  © 2026 miStudia.de - Markus Autsch – Glücksrad
</div>

</body>


</html>
